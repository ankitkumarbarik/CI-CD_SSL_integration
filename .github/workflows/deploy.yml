name: Deploy NodeJS on ExCloud

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        run: |
          docker build -t ankitkumarbarik/syncodx-node .
          docker push ankitkumarbarik/syncodx-node

      - name: Deploy Latest Version via SSH on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/CI-CD_SSL_integration
            git fetch origin
            git reset --hard origin/main
            sudo docker compose pull
            sudo docker compose up -d --scale nodejs-server=5
            sudo docker image prune -f
